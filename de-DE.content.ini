GS4U__ABOUTUS_INTRO_START="GS4u.net ist ein Monitoring-Dienst für Spieleserver, der seit 2008 betrieben wird. Ursprünglich wurde das Projekt zur Überwachung von Counter-Strike 1.6-Servern ins Leben gerufen, hat sich jedoch im Laufe der Zeit weiterentwickelt und"
GS4U__ABOUTUS_GAMES_LINK="unterstützt mittlerweile eine Vielzahl von Online-Spielen"
GS4U__ABOUTUS_INTRO_END="."
GS4U__ABOUTUS_TOOLS_TEXT="Wir bieten Spielern und Serveradministratoren praktische Werkzeuge, um Spieleserver zu finden, zu überwachen und zu bewerben. Unser Ziel ist es, Nutzern dabei zu helfen, passende Server zu finden und stets aktuelle Informationen über deren Status zu erhalten."
GS4U__ABOUTUS_OWNER_START="Wenn Sie einen Spieleserver betreiben, können Sie ihn"
GS4U__ABOUTUS_ADD_LINK="in unser Monitoring aufnehmen"
GS4U__ABOUTUS_OWNER_END="um dessen Sichtbarkeit zu erhöhen und mehr Spieler zu gewinnen."
GS4U__ABOUTUS_ADVERTISING_URL="advertising"
