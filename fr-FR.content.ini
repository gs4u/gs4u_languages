GS4U__ABOUTUS_INTRO_START="GS4u.net est un service de monitoring de serveurs de jeu actif depuis 2008. Créé au départ pour suivre les serveurs Counter-Strike 1.6, le projet a grandi au fil du temps et"
GS4U__ABOUTUS_GAMES_LINK="prend désormais en charge un large éventail de jeux en ligne"
GS4U__ABOUTUS_INTRO_END="."
GS4U__ABOUTUS_TOOLS_TEXT="Nous fournissons aux joueurs et aux administrateurs des outils pratiques pour rechercher, surveiller et promouvoir des serveurs de jeu. Notre objectif est d’aider les utilisateurs à trouver les serveurs qui leur conviennent et à obtenir des informations à jour sur leur état."
GS4U__ABOUTUS_OWNER_START="Si vous possédez un serveur de jeu, vous pouvez"
GS4U__ABOUTUS_ADD_LINK="l’ajouter à notre monitoring"
GS4U__ABOUTUS_OWNER_END="afin d’augmenter sa visibilité et d’attirer davantage de joueurs."
GS4U__ABOUTUS_ADVERTISING_URL="advertising"
